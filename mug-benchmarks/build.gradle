/*
 * This file was generated by the Gradle 'init' task.
 */

description = 'benchmarks'

java {
    sourceCompatibility = 21
    targetCompatibility = 21
    withJavadocJar()
}

// Showdown flag configuration
if (project.hasProperty('showdown')) {
    apply plugin: 'scala'

    sourceSets {
        test {
            scala {
                srcDirs = ['src/test/scala', 'src/test/java']
            }
            java {
                srcDirs = []
            }
        }
    }
} else {
    // Exclude the mixed Java/Scala showdown benchmark from default build
    sourceSets {
        test {
            java {
                exclude '**/ParserShowdownBenchmark.java'
            }
        }
    }
}

dependencies {
    implementation 'com.google.caliper:caliper:1.0-beta-2'
    implementation project(':mug')
    implementation project(':dot-parse')
    testImplementation 'junit:junit:4.12'
    testImplementation 'org.openjdk.jmh:jmh-core:1.37'
    testAnnotationProcessor 'org.openjdk.jmh:jmh-generator-annprocess:1.37'
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.0.0-M3'
    testImplementation 'com.google.truth:truth:0.42'
    testImplementation 'com.google.guava:guava:29.0-jre'
    testImplementation 'com.google.guava:guava-testlib:29.0-jre'
    
    // Add showdown dependencies only when showdown flag is active
    if (project.hasProperty('showdown')) {
        testImplementation 'org.scala-lang:scala-library:2.13.12'
        testImplementation 'com.lihaoyi:fastparse_2.13:3.0.2'
        testImplementation 'org.typelevel:cats-parse_2.13:1.0.0'
        testImplementation 'io.github.parseworks:taker:1.0-SNAPSHOT'
        testImplementation 'org.scala-lang.modules:scala-parser-combinators_2.13:2.3.0'
        testImplementation 'org.parboiled:parboiled_2.13:2.5.0'
    }
}
